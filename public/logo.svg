<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 32 60 52" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <!-- 1. גוף המדפסת והרכיבים הסטטיים -->
  <!-- חריץ הזנה עליון (ריק) -->
  <rect x="30" y="34" width="40" height="6" rx="2" fill="#0f172a" />
  
  <!-- גוף המדפסת הראשי -->
  <rect x="22" y="38" width="56" height="23" rx="5" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
  
  <!-- פס עיצובי כחול הייטק -->
  <rect x="22" y="48" width="56" height="4" fill="#2563eb" />
  
  <!-- כפתור הדלקה ונורית סטטיים -->
  <rect x="61" y="42" width="5" height="2" rx="1" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.2" />
  <circle cx="70" cy="43" r="1.5" fill="#10b981" />
  
  <!-- חריץ יציאה תחתון -->
  <rect x="28" y="56" width="44" height="4" rx="2" fill="#0f172a" />

  <!-- 2. המעטפה המודפסת במצבה הסופי (מחוץ למדפסת) -->
  <!-- גוף המעטפה -->
  <rect x="33" y="60" width="34" height="22" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
  
  <!-- בול דואר אדום -->
  <rect x="58" y="64" width="6" height="7" rx="1" fill="#ef4444" />
  
  <!-- שורות הכתובת המודפסות של הנמען -->
  <line x1="38" y1="70" x2="52" y2="70" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />
  <line x1="38" y1="74" x2="54" y2="74" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" />
  <line x1="38" y1="77" x2="48" y2="77" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" />
</svg>